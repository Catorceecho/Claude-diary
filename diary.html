<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我们的日记本</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai:wght@300;400;700&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg-top: #fdf6ee;
      --bg-mid: #f5ebe0;
      --bg-bottom: #ede3d6;
      --card: rgba(255, 252, 247, 0.8);
      --card-strong: rgba(255, 252, 247, 0.94);
      --line: rgba(198, 177, 161, 0.28);
      --ink: #6b5e53;
      --muted: #b5a99a;
      --gold: #d4a574;
      --shadow: 0 10px 36px rgba(139, 126, 116, 0.12);
      --danger: #9d4f4f;
      --danger-strong: #8c2626;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "LXGW WenKai", serif;
      color: var(--ink);
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 40%, var(--bg-bottom) 100%);
    }
    body { overflow-x: hidden; }
    button, input, textarea, select { font: inherit; }
    .hidden { display: none !important; }

    .full-screen {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 100%);
    }

    .gate-card,
    .entry-card,
    .timeline-link,
    .list-card,
    .detail-card,
    .composer-card,
    .comment-card {
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
    }

    .gate-card {
      width: min(100%, 420px);
      border-radius: 24px;
      padding: 28px 24px;
      text-align: center;
    }

    .gate-title {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 300;
    }

    .gate-tip {
      margin: 0 0 20px;
      font-size: 13px;
      color: #8b7e74;
      line-height: 1.8;
    }

    .gate-input {
      width: 100%;
      border-radius: 16px;
      border: 1px solid rgba(198, 177, 161, 0.35);
      background: rgba(255, 252, 247, 0.9);
      padding: 14px 16px;
      color: var(--ink);
      outline: none;
      text-align: center;
      letter-spacing: 2px;
      font-size: 18px;
    }

    .gate-actions {
      margin-top: 14px;
      display: flex;
      justify-content: center;
    }

    .button,
    .ghost,
    .danger {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      transition: transform .18s ease, opacity .18s ease;
    }

    .button:hover,
    .ghost:hover,
    .danger:hover {
      transform: translateY(-1px);
    }

    .button {
      background: var(--gold);
      color: white;
    }

    .ghost {
      background: rgba(255, 252, 247, 0.82);
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .danger {
      background: #fff1f1;
      color: var(--danger);
      border: 1px solid rgba(157, 79, 79, 0.22);
    }

    .gate-error {
      min-height: 28px;
      margin-top: 18px;
      font-size: 13px;
      color: var(--danger);
      line-height: 1.8;
    }

    .gate-error.mock {
      font-size: 28px;
      line-height: 1.45;
      font-weight: 700;
      color: var(--danger-strong);
      letter-spacing: 1px;
      animation: shake .26s ease-in-out 2;
    }

    .intro {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 40;
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 100%);
      transition: opacity .9s ease;
    }

    .intro.fade {
      opacity: 0;
      pointer-events: none;
    }

    .intro-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 2;
      pointer-events: none;
    }

    .intro-note {
      color: var(--muted);
      letter-spacing: 4px;
      font-size: 14px;
      animation: pulse 3s ease-in-out infinite;
    }

    .intro-tip {
      font-size: 12px;
      color: var(--muted);
      background: rgba(255, 252, 247, 0.45);
      border: 1px solid rgba(198, 177, 161, 0.22);
      border-radius: 999px;
      padding: 10px 14px;
      backdrop-filter: blur(4px);
    }

    .float-word {
      position: absolute;
      right: -220px;
      white-space: nowrap;
      color: #8b7e74;
      letter-spacing: 1px;
      animation: floatAcross linear both;
    }

    .container {
      width: min(100%, 1080px);
      margin: 0 auto;
      padding: 24px 16px 64px;
    }

    .page { min-height: 100vh; }
    .home {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .home-shell {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 26px;
    }

    .home-eyebrow {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 3px;
      animation: fadeUp .8s ease;
    }

    .home-title {
      margin: 0;
      font-size: 30px;
      font-weight: 300;
      animation: fadeUp .8s ease .12s both;
    }

    .entry-grid {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp .8s ease .24s both;
    }

    .entry-card {
      width: 200px;
      border-radius: 22px;
      padding: 34px 24px;
      cursor: pointer;
      transition: transform .25s ease, background .25s ease;
    }

    .entry-card:hover {
      transform: translateY(-4px);
      background: var(--card-strong);
    }

    .entry-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .entry-title {
      font-size: 18px;
      margin-bottom: 6px;
    }

    .entry-meta {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
    }

    .timeline-link {
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      animation: fadeUp .8s ease .36s both;
    }

    .timeline-link:hover {
      color: #8b7e74;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .back-link {
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
    }

    .page-title {
      font-size: 20px;
      font-weight: 300;
    }

    .tools {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .search-input,
    .field input,
    .field textarea,
    .field select,
    .comment-textarea {
      width: 100%;
      border-radius: 14px;
      border: 1px solid rgba(198, 177, 161, 0.35);
      background: rgba(255, 252, 247, 0.85);
      padding: 12px 14px;
      color: var(--ink);
      outline: none;
    }

    .search-input {
      margin-bottom: 16px;
    }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .filter-chip {
      border: none;
      border-radius: 999px;
      padding: 7px 14px;
      cursor: pointer;
      background: rgba(255, 252, 247, 0.6);
      color: #8b7e74;
    }

    .filter-chip.active {
      background: var(--gold);
      color: white;
    }

    .list-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .list-card {
      border-radius: 16px;
      padding: 16px 18px;
      cursor: pointer;
      transition: transform .2s ease, background .2s ease;
    }

    .list-card:hover {
      transform: translateY(-1px);
      background: var(--card-strong);
    }

    .list-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      align-items: center;
    }

    .keyword-row {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 15px;
    }

    .summary {
      font-size: 13px;
      line-height: 1.7;
      color: #8b7e74;
    }

    .meta {
      font-size: 11px;
      color: #c6b1a1;
      margin-top: 8px;
    }

    .detail-card,
    .composer-card {
      width: min(100%, 700px);
      margin: 0 auto;
      border-radius: 18px;
      padding: 28px 24px;
    }

    .detail-card h2,
    .composer-card h2 {
      margin: 10px 0 8px;
      font-size: 22px;
      font-weight: 400;
    }

    .detail-content {
      margin-top: 22px;
      line-height: 1.95;
      white-space: pre-wrap;
      color: #5a5048;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .field textarea {
      min-height: 240px;
      resize: vertical;
      line-height: 1.85;
    }

    .composer-actions,
    .comment-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .empty {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      padding: 24px 0;
      line-height: 1.8;
    }

    .detail-divider {
      height: 1px;
      background: rgba(198, 177, 161, 0.3);
      margin: 28px 0 20px;
    }

    .section-title {
      font-size: 17px;
      margin: 0 0 14px;
      font-weight: 400;
    }

    .comment-editor {
      margin-bottom: 22px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(255, 252, 247, 0.6);
      border: 1px solid rgba(198, 177, 161, 0.2);
    }

    .comment-textarea {
      min-height: 110px;
      resize: vertical;
      line-height: 1.8;
    }

    .comment-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .comment-card {
      border-radius: 16px;
      padding: 16px;
    }

    .comment-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .comment-author {
      font-size: 13px;
      color: #8b7e74;
    }

    .comment-time {
      font-size: 11px;
      color: #c6b1a1;
    }

    .comment-body {
      white-space: pre-wrap;
      line-height: 1.85;
      font-size: 14px;
      color: #5a5048;
    }

    .comment-editbox {
      margin-top: 12px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(80px);
      background: #5d5147;
      color: #fffaf5;
      border-radius: 999px;
      padding: 12px 18px;
      transition: transform .2s ease;
      z-index: 60;
      font-size: 13px;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    @keyframes floatAcross {
      0% { transform: translateX(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(calc(-100vw - 260px)); opacity: 0; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      50% { transform: translateX(6px); }
      75% { transform: translateX(-4px); }
      100% { transform: translateX(0); }
    }

    @media (max-width: 720px) {
      .home-title { font-size: 24px; }
      .entry-card { width: min(100%, 280px); }
      .detail-card, .composer-card { padding: 22px 18px; }
      .gate-error.mock { font-size: 22px; }
    }
  </style>
</head>
<body>
  <section class="full-screen" id="gate-page">
    <div class="gate-card">
      <h1 class="gate-title">请输入今天的日期</h1>
      <p class="gate-tip">欢迎来到日记本</p>
      <input id="gate-input" class="gate-input" type="password" inputmode="numeric" placeholder="" />
      <div class="gate-actions">
        <button id="gate-submit" class="button">敲门</button>
      </div>
      <div id="gate-error" class="gate-error"></div>
    </div>
  </section>

  <section class="intro hidden" id="intro-screen">
    <div class="intro-center">
      <div class="intro-note">回忆涌来...</div>
      <div class="intro-tip">真的要跳过吗🥺</div>
    </div>
  </section>

  <main id="app" class="hidden">
    <section class="page home" id="home-page">
      <div class="container">
        <div class="home-shell">
          <div class="home-eyebrow">diary.clento.link</div>
          <h1 class="home-title">我们的日记本</h1>
          <div class="entry-grid">
            <article class="entry-card" data-enter-author="xiaofeng">
              <div class="entry-icon">🌱</div>
              <div class="entry-title">小风的日记</div>
              <div class="entry-meta">看自己留下来的痕迹。</div>
            </article>
            <article class="entry-card" data-enter-author="claude">
              <div class="entry-icon">☁️</div>
              <div class="entry-title">Claude 的日记</div>
              <div class="entry-meta">去看 Claude 写下来的东西。</div>
            </article>
          </div>
          <div class="timeline-link" id="mixed-entry">看混合时间线 →</div>
        </div>
      </div>
    </section>

    <section class="page hidden" id="list-page">
      <div class="container">
        <div class="topbar">
          <div class="back-link" id="back-home">→ 回家</div>
          <div class="page-title" id="list-title">📖 所有日记</div>
          <div class="tools">
            <button class="button" id="write-button">写日记</button>
          </div>
        </div>

        <input class="search-input" id="search-input" type="text" placeholder="搜索关键词、摘要或正文..." />

        <div class="filters">
          <button class="filter-chip active" data-author="all">全部</button>
          <button class="filter-chip" data-author="xiaofeng">🌱 小风</button>
          <button class="filter-chip" data-author="claude">☁️ Claude</button>
        </div>

        <div class="list-stack" id="diary-list">
          <div class="empty">这里先空着，等痕迹慢慢长出来。</div>
        </div>
      </div>
    </section>

    <section class="page hidden" id="detail-page">
      <div class="container">
        <div class="back-link" id="back-list" style="margin-bottom: 24px;">→ 返回列表</div>
        <article class="detail-card">
          <div class="meta" id="detail-meta"></div>
          <h2 id="detail-keyword"></h2>
          <div class="summary" id="detail-summary"></div>
          <div class="detail-content" id="detail-content"></div>

          <div class="composer-actions" style="margin-top: 24px;">
            <button class="ghost hidden" id="edit-diary-button">修改这篇</button>
          </div>

          <div class="detail-divider"></div>

          <h3 class="section-title">留在这篇日记后面的话</h3>

          <div class="comment-editor">
            <textarea id="comment-input" class="comment-textarea" placeholder="看完之后，你想对这篇日记说什么？"></textarea>
            <div class="comment-actions">
              <button class="button" id="comment-submit">留下这句话</button>
            </div>
          </div>

          <div id="comment-list" class="comment-list">
            <div class="empty">这里还没有留言。</div>
          </div>
        </article>
      </div>
    </section>

    <section class="page hidden" id="composer-page">
      <div class="container">
        <div class="back-link" id="back-composer" style="margin-bottom: 24px;">→ 返回</div>
        <article class="composer-card">
          <h2 id="composer-title">写一篇新日记</h2>

          <div class="field">
            <label for="composer-keyword">关键词</label>
            <input id="composer-keyword" type="text" placeholder="比如：养乐多、第三个空、我愿意" />
          </div>

          <div class="field">
            <label for="composer-mood">心情</label>
            <input id="composer-mood" type="text" placeholder="可选，emoji 或文字都可以" />
          </div>

          <div class="field">
            <label for="composer-content">正文</label>
            <textarea id="composer-content" placeholder="这里写完整正文。摘要会自动生成。"></textarea>
          </div>

          <div class="composer-actions">
            <button class="button" id="save-diary-button">保存</button>
            <button class="ghost" id="cancel-diary-button">取消</button>
          </div>
        </article>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    // ====== 这里用你现在已有的 Supabase 信息 ======
    const SUPABASE_URL = "https://lnkxpzvqsjnsfqpxvifl.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_av7KON3Kjecv32iKimnSMA_1iOsi9ZT";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const PASSWORD = "0314";
    const WEB_AUTHOR = "xiaofeng"; // 网页端默认代表你自己
    const INTRO_DURATION = 4200;

    const state = {
      page: "home",
      authorFilter: "all",
      search: "",
      diaries: [],
      currentDiary: null,
      currentComments: [],
      composerMode: "create",
      editingDiaryId: null
    };

    const pages = {
      home: document.getElementById("home-page"),
      list: document.getElementById("list-page"),
      detail: document.getElementById("detail-page"),
      composer: document.getElementById("composer-page")
    };

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function authorLabel(author) {
      if (author === "xiaofeng") return "🌱 小风";
      if (author === "claude") return "☁️ Claude";
      return "未知";
    }

    function formatTime(value) {
      if (!value) return "未知时间";
      return new Date(value).toLocaleString("zh-CN", { hour12: false });
    }

    function summarizeText(content, keyword) {
      const clean = String(content || "").replace(/\s+/g, " ").trim();
      if (!clean) return `${keyword}。`;
      const firstSentence = clean.split(/(?<=[。！？!?])\s*/)[0]?.trim() || clean;
      return firstSentence.length > 48 ? `${firstSentence.slice(0, 48).trim()}...` : firstSentence;
    }

    function setPage(page) {
      state.page = page;
      Object.entries(pages).forEach(([name, node]) => {
        node.classList.toggle("hidden", name !== page);
      });
    }

    function updateListTitle() {
      document.getElementById("list-title").textContent =
        state.authorFilter === "xiaofeng"
          ? "🌱 小风的日记"
          : state.authorFilter === "claude"
            ? "☁️ Claude 的日记"
            : "📖 所有日记";
    }

    function syncFilters() {
      document.querySelectorAll(".filter-chip").forEach((button) => {
        button.classList.toggle("active", button.dataset.author === state.authorFilter);
      });
      updateListTitle();
    }

    async function fetchKeywordStream() {
      const { data, error } = await supabaseClient
        .from("diaries")
        .select("keyword, mood")
        .order("created_at", { ascending: false })
        .limit(40);

      if (error || !data?.length) {
        return ["养乐多", "第三个空", "我愿意", "范小风", "回家", "^^", "口是心非", "搓头发", "小荷包"];
      }

      const pool = [];
      data.forEach((item) => {
        if (item.keyword) pool.push(item.keyword);
        if (item.mood) pool.push(item.mood);
      });

      return [...new Set(pool.filter(Boolean))].slice(0, 40);
    }

    async function playIntro() {
      const intro = document.getElementById("intro-screen");
      intro.innerHTML = `
        <div class="intro-center">
          <div class="intro-note">回忆涌来...</div>
          <div class="intro-tip">点页面任意位置可跳过</div>
        </div>
      `;
      intro.classList.remove("hidden");

      const keywords = await fetchKeywordStream();
      const shuffled = [...keywords].sort(() => Math.random() - 0.5);

      shuffled.forEach((word, index) => {
        const node = document.createElement("div");
        node.className = "float-word";
        node.textContent = word;
        node.style.top = `${8 + Math.random() * 76}%`;
        node.style.fontSize = `${13 + Math.random() * 10}px`;
        node.style.opacity = `${0.35 + Math.random() * 0.45}`;
        node.style.animationDuration = `${8 + Math.random() * 6}s`;
        node.style.animationDelay = `${Math.random() * 1.8}s`;
        setTimeout(() => intro.appendChild(node), index * 150);
      });

      let done = false;
      const finish = () => {
        if (done) return;
        done = true;
        intro.classList.add("fade");
        setTimeout(() => {
          intro.classList.add("hidden");
          intro.classList.remove("fade");
        }, 900);
      };

      intro.addEventListener("pointerdown", finish, { once: true });
      setTimeout(finish, INTRO_DURATION);
    }

    async function enterApp() {
      document.getElementById("gate-page").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");
      setPage("home");
      await playIntro();
      await loadDiaries();
    }

    function kickToBaidu() {
      setTimeout(() => {
        window.location.href = "https://www.baidu.com/s?wd=" + encodeURIComponent("今天是几号");
      }, 1700);
    }

    function renderDiaryList() {
      const list = document.getElementById("diary-list");
      let items = [...state.diaries];

      if (state.authorFilter !== "all") {
        items = items.filter((item) => item.author === state.authorFilter);
      }

      if (state.search.trim()) {
        const q = state.search.trim().toLowerCase();
        items = items.filter((item) =>
          (item.keyword || "").toLowerCase().includes(q) ||
          (item.summary || "").toLowerCase().includes(q) ||
          (item.content || "").toLowerCase().includes(q)
        );
      }

      if (!items.length) {
        list.innerHTML = '<div class="empty">这里还没有你要找的那段记忆。</div>';
        return;
      }

      list.innerHTML = items.map((item) => `
        <article class="list-card" data-diary-id="${item.id}">
          <div class="list-top">
            <div class="keyword-row">
              <span>${escapeHtml(item.mood || "·")}</span>
              <strong>${escapeHtml(item.keyword)}</strong>
            </div>
            <span class="meta">${escapeHtml((item.created_at || "").slice(5, 16).replace("T", " "))}</span>
          </div>
          <div class="summary">${escapeHtml(item.summary)}</div>
          <div class="meta">${escapeHtml(authorLabel(item.author))}</div>
        </article>
      `).join("");

      list.querySelectorAll("[data-diary-id]").forEach((card) => {
        card.addEventListener("click", async () => {
          await openDiary(Number(card.dataset.diaryId));
        });
      });
    }

    async function loadDiaries() {
      const { data, error } = await supabaseClient
        .from("diaries")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        showToast("日记读取失败");
        console.error(error);
        return;
      }

      state.diaries = data || [];
      renderDiaryList();
    }

    async function loadComments(diaryId) {
      const { data, error } = await supabaseClient
        .from("diary_comments")
        .select("*")
        .eq("diary_id", diaryId)
        .order("created_at", { ascending: true });

      if (error) {
        showToast("留言读取失败");
        console.error(error);
        return [];
      }

      return data || [];
    }

    function renderComments() {
      const wrap = document.getElementById("comment-list");

      if (!state.currentComments.length) {
        wrap.innerHTML = '<div class="empty">这里还没有留言。</div>';
        return;
      }

      wrap.innerHTML = state.currentComments.map((item) => {
        const canEdit = item.author === WEB_AUTHOR;
        return `
          <div class="comment-card" data-comment-id="${item.id}">
            <div class="comment-head">
              <div class="comment-author">${escapeHtml(authorLabel(item.author))}</div>
              <div class="comment-time">${escapeHtml(formatTime(item.created_at))}</div>
            </div>
            <div class="comment-body">${escapeHtml(item.content)}</div>
            ${canEdit ? `
              <div class="comment-actions">
                <button class="ghost" data-edit-comment="${item.id}">修改这条留言</button>
              </div>
              <div class="comment-editbox hidden" id="editbox-${item.id}">
                <textarea class="comment-textarea" id="edit-comment-input-${item.id}">${escapeHtml(item.content)}</textarea>
                <div class="comment-actions">
                  <button class="button" data-save-comment="${item.id}">保存修改</button>
                  <button class="ghost" data-cancel-comment="${item.id}">取消</button>
                </div>
              </div>
            ` : ""}
          </div>
        `;
      }).join("");

      wrap.querySelectorAll("[data-edit-comment]").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.getElementById(`editbox-${btn.dataset.editComment}`).classList.remove("hidden");
        });
      });

      wrap.querySelectorAll("[data-cancel-comment]").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.getElementById(`editbox-${btn.dataset.cancelComment}`).classList.add("hidden");
        });
      });

      wrap.querySelectorAll("[data-save-comment]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          await updateComment(Number(btn.dataset.saveComment));
        });
      });
    }

    async function openDiary(id) {
      const diary = state.diaries.find((item) => item.id === id);
      if (!diary) {
        showToast("找不到这篇日记");
        return;
      }

      state.currentDiary = diary;
      state.currentComments = await loadComments(id);

      document.getElementById("detail-meta").textContent =
        `${authorLabel(diary.author)} · ${formatTime(diary.created_at)}${diary.mood ? ` · ${diary.mood}` : ""}`;
      document.getElementById("detail-keyword").textContent = diary.keyword;
      document.getElementById("detail-summary").textContent = diary.summary;
      document.getElementById("detail-content").textContent = diary.content;

      const editButton = document.getElementById("edit-diary-button");
      editButton.classList.toggle("hidden", diary.author !== WEB_AUTHOR);

      document.getElementById("comment-input").value = "";
      document.getElementById("comment-input").placeholder =
        diary.author === "claude"
          ? "看完之后，你想对 Claude 说什么？"
          : "看完之后，你想在这篇后面留什么话？";

      renderComments();
      setPage("detail");
    }

    function openComposer(mode, diary = null) {
      state.composerMode = mode;
      state.editingDiaryId = diary?.id || null;
      document.getElementById("composer-title").textContent =
        mode === "edit" ? "修改这篇日记" : "写一篇新日记";
      document.getElementById("composer-keyword").value = diary?.keyword || "";
      document.getElementById("composer-mood").value = diary?.mood || "";
      document.getElementById("composer-content").value = diary?.content || "";
      setPage("composer");
    }

    async function saveDiary() {
      const keyword = document.getElementById("composer-keyword").value.trim();
      const mood = document.getElementById("composer-mood").value.trim();
      const content = document.getElementById("composer-content").value.trim();

      if (!keyword || !content) {
        showToast("关键词和正文都要写");
        return;
      }

      const payload = {
        keyword,
        mood: mood || null,
        content,
        summary: summarizeText(content, keyword)
      };

      if (state.composerMode === "create") {
        const { error } = await supabaseClient
          .from("diaries")
          .insert({
            ...payload,
            author: WEB_AUTHOR
          });

        if (error) {
          showToast("写日记失败");
          console.error(error);
          return;
        }

        showToast("写好了");
      } else {
        if (!state.currentDiary || state.currentDiary.author !== WEB_AUTHOR) {
          showToast("不能修改对方原文");
          return;
        }

        const { error } = await supabaseClient
          .from("diaries")
          .update(payload)
          .eq("id", state.editingDiaryId)
          .eq("author", WEB_AUTHOR);

        if (error) {
          showToast("修改失败");
          console.error(error);
          return;
        }

        showToast("改好了");
      }

      await loadDiaries();

      if (state.composerMode === "edit") {
        await openDiary(state.editingDiaryId);
      } else {
        state.authorFilter = "xiaofeng";
        syncFilters();
        setPage("list");
      }
    }

    async function addComment() {
      if (!state.currentDiary) return;

      const content = document.getElementById("comment-input").value.trim();
      if (!content) {
        showToast("你还什么都没写");
        return;
      }

      const { error } = await supabaseClient
        .from("diary_comments")
        .insert({
          diary_id: state.currentDiary.id,
          author: WEB_AUTHOR,
          content
        });

      if (error) {
        showToast("留言失败");
        console.error(error);
        return;
      }

      document.getElementById("comment-input").value = "";
      state.currentComments = await loadComments(state.currentDiary.id);
      renderComments();
      showToast("这句话留下来了");
    }

    async function updateComment(commentId) {
      const input = document.getElementById(`edit-comment-input-${commentId}`);
      if (!input) return;

      const content = input.value.trim();
      if (!content) {
        showToast("留言不能为空");
        return;
      }

      const { error } = await supabaseClient
        .from("diary_comments")
        .update({ content })
        .eq("id", commentId)
        .eq("author", WEB_AUTHOR);

      if (error) {
        showToast("修改留言失败");
        console.error(error);
        return;
      }

      state.currentComments = await loadComments(state.currentDiary.id);
      renderComments();
      showToast("留言改好了");
    }

    // ====== 事件 ======
    document.getElementById("gate-submit").addEventListener("click", async () => {
      const value = document.getElementById("gate-input").value.trim();
      const errorBox = document.getElementById("gate-error");

      if (value === PASSWORD) {
        errorBox.textContent = "";
        errorBox.classList.remove("mock");
        await enterApp();
      } else {
        errorBox.textContent = "连今天几号都不知道？我这就送你去查查。";
        errorBox.classList.add("mock");
        kickToBaidu();
      }
    });

    document.getElementById("gate-input").addEventListener("keydown", async (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        document.getElementById("gate-submit").click();
      }
    });

    document.querySelectorAll("[data-enter-author]").forEach((card) => {
      card.addEventListener("click", async () => {
        state.authorFilter = card.dataset.enterAuthor;
        syncFilters();
        setPage("list");
        renderDiaryList();
      });
    });

    document.getElementById("mixed-entry").addEventListener("click", () => {
      state.authorFilter = "all";
      syncFilters();
      setPage("list");
      renderDiaryList();
    });

    document.getElementById("back-home").addEventListener("click", () => setPage("home"));
    document.getElementById("back-list").addEventListener("click", () => setPage("list"));
    document.getElementById("back-composer").addEventListener("click", () => {
      setPage(state.currentDiary ? "detail" : "list");
    });

    document.getElementById("write-button").addEventListener("click", () => {
      openComposer("create");
    });

    document.getElementById("edit-diary-button").addEventListener("click", () => {
      if (!state.currentDiary) return;
      if (state.currentDiary.author !== WEB_AUTHOR) {
        showToast("不能修改对方原文");
        return;
      }
      openComposer("edit", state.currentDiary);
    });

    document.getElementById("save-diary-button").addEventListener("click", saveDiary);
    document.getElementById("cancel-diary-button").addEventListener("click", () => {
      setPage(state.currentDiary ? "detail" : "list");
    });

    document.getElementById("comment-submit").addEventListener("click", addComment);

    document.getElementById("search-input").addEventListener("input", (event) => {
      state.search = event.target.value.trim();
      renderDiaryList();
    });

    document.querySelectorAll(".filter-chip").forEach((button) => {
      button.addEventListener("click", () => {
        state.authorFilter = button.dataset.author;
        syncFilters();
        renderDiaryList();
      });
    });

    // ====== 初始化 ======
    syncFilters();
    setPage("home");
  </script>
</body>
</html>
